name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  # Replace with your actual Docker Hub username in the future or use a repository secret
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
  # We will use the commit hash for versioning images (e.g., node-app:sha-12345)
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [dotnet-api, php-service, react-app]
        include:
          - service: dotnet-api
            context: ./dotnet-api
            image_name: code-review-api
          - service: php-service
            context: ./php-service
            image_name: code-review-php
          - service: react-app
            context: ./react-app
            image_name: code-review-frontend

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      # Only login if it's a push event (not pull request), and if secrets are available
      if: github.event_name != 'pull_request' && env.DOCKER_HUB_USERNAME != ''
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ${{ matrix.context }}
        push: ${{ github.event_name != 'pull_request' && env.DOCKER_HUB_USERNAME != '' }}
        tags: |
          ${{ secrets.DOCKER_HUB_USERNAME }}/${{ matrix.image_name }}:latest
          ${{ secrets.DOCKER_HUB_USERNAME }}/${{ matrix.image_name }}:${{ env.IMAGE_TAG }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
