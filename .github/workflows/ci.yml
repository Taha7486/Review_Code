name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # TEST JOBS (Must pass before building)
  
  test-dotnet:
    name: Test .NET API
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore dependencies
      run: dotnet restore
      working-directory: ./dotnet-api

    - name: Build
      run: dotnet build --no-restore --configuration Release
      working-directory: ./dotnet-api

    - name: Run tests
      run: dotnet test --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=test-results.trx"
      working-directory: ./dotnet-api/tests

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: dotnet-test-results
        path: dotnet-api/tests/TestResults/*.trx

  test-php:
    name: Test PHP Service
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, curl
        coverage: none

    - name: Validate composer.json and composer.lock
      run: composer validate --strict
      working-directory: ./php-service

    - name: Install dependencies
      run: composer install --prefer-dist --no-progress --no-suggest
      working-directory: ./php-service

    - name: Run tests
      run: php tests/run_tests.php
      working-directory: ./php-service

  test-react:
    name: Test React Frontend
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: react-app/package-lock.json

    - name: Install dependencies
      run: npm ci
      working-directory: ./react-app

    - name: Run tests
      run: npm test -- --watchAll=false --passWithNoTests
      working-directory: ./react-app
      env:
        CI: true

    - name: Build production bundle
      run: npm run build
      working-directory: ./react-app

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: react-build
        path: react-app/build/


  # BUILD & PUSH JOBS (After tests pass)

  build-and-push:
    name: Build & Push ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [test-dotnet, test-php, test-react]  # Wait for all tests to pass
    
    strategy:
      matrix:
        service: [dotnet-api, php-service, react-app]
        include:
          - service: dotnet-api
            context: ./dotnet-api
            image_name: code-review-api
          - service: php-service
            context: ./php-service
            image_name: code-review-php
          - service: react-app
            context: ./react-app
            image_name: code-review-frontend

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      if: github.event_name != 'pull_request' && env.DOCKER_HUB_USERNAME != ''
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ${{ matrix.context }}
        push: ${{ github.event_name != 'pull_request' && env.DOCKER_HUB_USERNAME != '' }}
        tags: |
          ${{ secrets.DOCKER_HUB_USERNAME }}/${{ matrix.image_name }}:latest
          ${{ secrets.DOCKER_HUB_USERNAME }}/${{ matrix.image_name }}:${{ env.IMAGE_TAG }}
        cache-from: type=gha
        cache-to: type=gha,mode=max


  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test-dotnet, test-php, test-react]
    if: always()
    
    steps:
    - name: Check test results
      env:
        DOTNET_RESULT: ${{ needs.test-dotnet.result }}
        PHP_RESULT: ${{ needs.test-php.result }}
        REACT_RESULT: ${{ needs.test-react.result }}
      run: |
        echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ .NET Tests: $DOTNET_RESULT" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ PHP Tests: $PHP_RESULT" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ React Tests: $REACT_RESULT" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [[ "$DOTNET_RESULT" == "success" && "$PHP_RESULT" == "success" && "$REACT_RESULT" == "success" ]]; then
          echo "🎉 All tests passed!" >> $GITHUB_STEP_SUMMARY
          exit 0
        else
          echo "❌ Some tests failed!" >> $GITHUB_STEP_SUMMARY
          exit 1
        fi
