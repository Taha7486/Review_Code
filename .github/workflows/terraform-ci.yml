name: Terraform CI

# Runs on any PR or push to main that touches terraform sources.
# Scope: fmt-check, init, validate.


on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'

permissions:
  contents: read

jobs:
  terraform:
    name: fmt / init / validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.9"

      # Check from terraform/ root so all modules are covered, not just the environment entry-point.
      - name: Terraform fmt
        run: terraform fmt -check -recursive
        working-directory: terraform

      - name: Terraform init
        run: terraform init
        working-directory: terraform/environments/kind

      - name: Terraform validate
        run: terraform validate
        working-directory: terraform/environments/kind
