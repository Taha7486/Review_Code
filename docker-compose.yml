version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: code-review-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infrastructure/mysql/DB_Schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "3306:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - code-review-network

  php-service:
    build:
      context: ./php-service
      dockerfile: Dockerfile
    container_name: code-review-php
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - PHP_MEMORY_LIMIT=512M
    ports:
      - "8000:8000"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - code-review-network
    restart: unless-stopped

  dotnet-api:
    build:
      context: ./dotnet-api
      dockerfile: Dockerfile
    container_name: code-review-api
    depends_on:
      mysql:
        condition: service_healthy
      php-service:
        condition: service_healthy
    environment:
      - ASPNETCORE_URLS=http://+:5116
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=${DB_NAME}
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - PHP_ANALYSIS_API_URL=${PHP_ANALYSIS_API_URL}
      - GITHUB_PAT=${GITHUB_PAT}
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET}
    ports:
      - "5116:5116"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5116/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - code-review-network
    restart: unless-stopped

  react-app:
    build:
      context: ./react-app
      dockerfile: Dockerfile
    container_name: code-review-frontend
    depends_on:
      - dotnet-api
    environment:
      - REACT_APP_API_URL=${REACT_APP_API_URL}
    ports:
      - "3000:80"
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - code-review-network
    restart: unless-stopped

  mysql-exporter:
    image: prom/mysqld-exporter:latest
    container_name: code-review-mysql-exporter
    volumes:
      - ./infrastructure/mysql/.my.cnf:/.my.cnf
    command:
      - --config.my-cnf=/.my.cnf
      - --collect.global_status
      - --collect.info_schema.tables
      - --no-collect.global_variables
      - --no-collect.info_schema.innodb_metrics
      - --no-collect.info_schema.processlist
      - --no-collect.info_schema.tablestats
      - --no-collect.info_schema.userstats
      - --no-collect.perf_schema.eventsstatements
      - --no-collect.perf_schema.file_events
      - --no-collect.slave_status
    ports:
      - "9104:9104"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - code-review-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: code-review-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - code-review-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: code-review-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    networks:
      - code-review-network
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  mysql_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  code-review-network:
    driver: bridge
