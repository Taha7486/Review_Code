global:
  scrape_interval: 60s
  evaluation_interval: 60s

scrape_configs:
  # .NET API
  - job_name: 'dotnet-api'
    static_configs:
      - targets: ['code-review-api:5116']
    metrics_path: '/metrics'
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'code_review_analyses_started_total|code_review_issues_found_total|http_requests_total|http_request_duration_seconds.*|process_cpu_seconds_total|process_resident_memory_bytes|up'
        action: keep

  # PHP Analysis Service
  - job_name: 'php-service'
    static_configs:
      - targets: ['code-review-php:8000']
    metrics_path: '/metrics'
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'code_review_analyses_started_total|php_files_analyzed_total|code_review_issues_found_total|php_analysis_duration_seconds.*|up'
        action: keep

  # MySQL Database Exporter
  - job_name: 'mysql'
    static_configs:
      - targets: ['code-review-mysql-exporter:9104']
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'mysql_global_status_threads_connected|mysql_up|up'
        action: keep
