apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: codereview-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Taha7486/Review_Code.git
    targetRevision: deploy
    path: k8s/base
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false