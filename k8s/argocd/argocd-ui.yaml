apiVersion: v1
kind: Service
metadata:
  name: argocd-server-nodeport
  namespace: argocd
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: argocd-server
  ports:
    - name: https
      port: 443          # service port
      targetPort: 8080   # argocd-server container port
      nodePort: 30080    # NodePort (matches your kind-config mapping)