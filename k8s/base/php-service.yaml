apiVersion: apps/v1
kind: Deployment
metadata:
  name: php-service
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 2 # Run 2 instances for load balancing
  selector:
    matchLabels:
      app: php-service
  template:
    metadata:
      labels:
        app: php-service
        component: analyzer
        part-of: codereview
      annotations:
        prometheus.io/scrape: "false"
    spec:
      serviceAccountName: sa-php-service
      containers:
      - name: php-service
        image: taha7486/code-review-php:ad7a91e573d092fd5c9aaa4798f797a96aea034b
        ports:
        - containerPort: 8000
        env:
        - name: PHP_MEMORY_LIMIT
          value: "512M"
        - name: APP_ENV
          value: "production"
        - name: INTERNAL_SERVICE_SECRET
          valueFrom:
            secretKeyRef:
              name: dotnet-secrets
              key: INTERNAL_SERVICE_SECRET
        resources:  # Resource limits prevent one pod from hogging resources
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: php-service
spec:
  selector:
    app: php-service
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP  # Internal-only (not exposed outside cluster)
