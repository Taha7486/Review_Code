apiVersion: apps/v1
kind: Deployment
metadata:
  name: php-service
spec:
  replicas: 2 # Run 2 instances for load balancing
  selector:
    matchLabels:
      app: php-service
  template:
    metadata:
      labels:
        app: php-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      containers:
      - name: php-service
        image: taha7486/code-review-php:latest # This will be overwritten by CI
        command: ["/bin/sh", "-c", "echo 'Simulating Failure'; exit 1"] # INTENTIONAL FAILURE
        ports:
        - containerPort: 8000
        env:
        - name: PHP_MEMORY_LIMIT
          value: "512M"
        resources:  # Resource limits prevent one pod from hogging resources
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: php-service
spec:
  selector:
    app: php-service
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP  # Internal-only (not exposed outside cluster)