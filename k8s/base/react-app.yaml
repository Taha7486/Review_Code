apiVersion: v1
kind: ConfigMap
metadata:
  name: react-config
data:
  REACT_APP_API_URL: "http://dotnet-api:5116/api"  # Internal cluster DNS
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: react-app
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: react-app
  template:
    metadata:
      labels:
        app: react-app
        component: frontend
        part-of: codereview
    spec:
      serviceAccountName: sa-react-app
      containers:
      - name: react-app
        image: taha7486/code-review-frontend:ad7a91e573d092fd5c9aaa4798f797a96aea034b
        ports:
        - containerPort: 80  # Nginx serves on port 80 inside container
        envFrom:
        - configMapRef:
            name: react-config
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: react-app
spec:
  selector:
    app: react-app
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30000  # Exposed on http://localhost:3000 (kind) or node IP (Civo)
  type: NodePort  # Makes service accessible outside cluster
