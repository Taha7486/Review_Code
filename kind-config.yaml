kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
# kindnet does not enforce NetworkPolicy. Disable it and install Calico instead.
# After `kind create cluster`, run:
#   kubectl apply -f https://raw.githubusercontent.com/projectcalico/calico/v3.29.0/manifests/calico.yaml
# Then wait: kubectl -n kube-system wait pod -l k8s-app=calico-node --for=condition=Ready --timeout=120s
networking:
  disableDefaultCNI: true
  podSubnet: "192.168.0.0/16"
nodes:
- role: control-plane
  extraPortMappings: # this exposes services to the host machine 
  # React Frontend
  - containerPort: 30000
    hostPort: 3000
    protocol: TCP
  # .NET API
  - containerPort: 30116
    hostPort: 5116
    protocol: TCP
  # Prometheus
  - containerPort: 30090
    hostPort: 9090
    protocol: TCP
  # Grafana
  - containerPort: 30001
    hostPort: 3001
    protocol: TCP
  # ArgoCD UI
  - containerPort: 30080
    hostPort: 8080
    protocol: TCP
  # Vault UI
  - containerPort: 30200
    hostPort: 30200
    protocol: TCP